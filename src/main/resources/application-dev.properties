spring.application.name=projeto1-2026

spring.jpa.properties.jakarta.persistence.schema-generation.create-source=metadata
spring.jpa.properties.jakarta.persistence.schema-generation.scripts.action=create
spring.jpa.properties.jakarta.persistence.schema-generation.scripts.create-target=create.sql
spring.jpa.properties.hibernate.hbm2ddl.delimiter=;
spring.datasource.hibernate.show-sql=true
spring.datasource.hibernate.format_sql=true
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.url=jdbc:mysql://localhost:3306/escola
spring.jpa.hibernate.ddl-auto=none

notificador.email.host=smtp.gmail.com

springdoc.api-docs.path=/api-docs

spring.jpa.open-in-view=true

spring.mail.host=${EMAIL_HOST:smtp.gmail.com}
spring.mail.port=${EMAIL_PORT:587}
spring.mail.username=${EMAIL_USERNAME:bmatheusgarcia@gmail.com}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.flyway.schemas=escola
spring.flyway.baseline-version=0
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=true
spring.flyway.locations=classpath:db/migration
spring.flyway.sql-migration-prefix=V
spring.flyway.validate-on-migrate=true
spring.flyway.enabled=true
spring.flyway.fail-on-missing-locations=true
spring.flyway.repair=true

security.client.id=${CLIENT_ID:myclientid}
security.client.secret=${CLIENT_SECRET:myclientsecret}

security.jwt.duration=${JWT_DURATION:86400}

email.password-recover.token.minutes=${PASSWORD_RECOVER_TOKEN_MINUTES:30}
email.password-recover.uri=${PASSWORD_RECOVER_URI:http://localhost:5173/recover-password/}

cors.origins=${CORS_ORIGINS:http://localhost:3000,http://ifmg.edu.br}